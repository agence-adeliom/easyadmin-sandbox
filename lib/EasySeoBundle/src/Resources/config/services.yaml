services:
  Adeliom\EasySeoBundle\Twig\EasySeoExtension:
    arguments:
      - "@twig"
      - "@event_dispatcher"
      - "@easy_seo.breadcrumb"
      - '%easy_seo.title%'
      - '%easy_seo.breadcrumbs%'
    tags:
      - twig.extension

  Adeliom\EasySeoBundle\Services\BreadCrumbCollection:
    public: true
    calls:
      - [ 'setGenerator', [ '@router.default' ] ]

  easy_seo.breadcrumb:
    alias: Adeliom\EasySeoBundle\Services\BreadCrumbCollection

  Adeliom\EasySeoBundle\Form\SeoType:
    arguments:
      - "@translator.default"
    public: true
