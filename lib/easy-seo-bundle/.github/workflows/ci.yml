name: Run tests

on:
  pull_request:
      branches:
          - 3.x
  push:
      branches:
          - 3.x

jobs:
    phpunit:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                composer-prefs: [ '--prefer-stable', '--prefer-lowest' ]
                php-version: [ '8.2' ]
                symfony-version: [ '6.4.*', '7.3.*' ]
        name: 'PHPUnit - PHP/${{ matrix.php-version }} - SF/${{ matrix.symfony-version }} ${{ matrix.composer-prefs }}'
        steps:
            -   name: Checkout
                uses: actions/checkout@v2
            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-version }}
            -   run: composer global config --no-plugins allow-plugins.symfony/flex true
            -   run: composer global require --no-progress --no-scripts --no-plugins symfony/flex
            -   name: Install Dependencies
                env:
                    COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{secrets.COMPOSER_AUTH}}"} }' # [tl! **]
                    SYMFONY_REQUIRE: ${{ matrix.symfony-version }}
                run: composer update --prefer-dist --no-interaction ${{ matrix.composer-prefs }}
            -   name: PHPUnit
                run: vendor/bin/phpunit tests
