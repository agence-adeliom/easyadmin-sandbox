imports:
    - { resource: "@SyliusCoreBundle/Resources/config/app/config.yml" }
    - { resource: "@SyliusAdminBundle/Resources/config/app/config.yml" }
    - { resource: "@SyliusApiBundle/Resources/config/app/config.yaml" }
    - { resource: "@SyliusShopBundle/Resources/config/app/config.yml" }
    - { resource: "@EasyShopBundle/Resources/config/app/sylius/sylius_mailer.yml" }
    - { resource: "@EasyShopBundle/Resources/config/grids/account/order.yml" }
    - { resource: "@EasyShopBundle/Resources/config/grids/product.yml" }
    - { resource: "@EasyShopBundle/Resources/config/app/ui/shop.yml" }

parameters:
    sylius.security.shop_regex: "^/(?!admin|api/.*|api$|media/.*)[^/]++"

sylius_taxonomy:
    resources:
        taxon:
            classes:
                repository: Adeliom\EasyShopBundle\Repository\TaxonRepository

sylius_product:
    resources:
        product:
            classes:
                repository: Adeliom\EasyShopBundle\Repository\ProductRepository

sylius_grid:
    templates:
        action:
            default: "@EasyShop/SyliusUiBundle/Grid/Action/default.html.twig"
            create: "@EasyShop/SyliusUiBundle/Grid/Action/create.html.twig"
            delete: "@EasyShop/SyliusUiBundle/Grid/Action/delete.html.twig"
            show: "@EasyShop/SyliusUiBundle/Grid/Action/show.html.twig"
            update: "@EasyShop/SyliusUiBundle/Grid/Action/update.html.twig"
            apply_transition: "@EasyShop/SyliusUiBundle/Grid/Action/applyTransition.html.twig"
            links: "@EasyShop/SyliusUiBundle/Grid/Action/links.html.twig"
            archive: "@EasyShop/SyliusUiBundle/Grid/Action/archive.html.twig"

            pay: "@EasyShop/SyliusShop/Account/Order/Grid/Action/_pay_deprecated.html.twig"
            shop_show: "@EasyShop/SyliusShop/Grid/Action/show.html.twig"
            shop_pay: "@EasyShop/SyliusShop/Account/Order/Grid/Action/pay.html.twig"
        filter:
            shop_string: "@EasyShop/SyliusShop/Grid/Filter/string.html.twig"

easy_shop:
    checkout_resolver:
        pattern: /checkout/.+
        route_map:
            empty_order:
                route: easy_shop_cart_summary
            cart:
                route: easy_shop_checkout_address
            addressed:
                route: easy_shop_checkout_select_shipping
            shipping_selected:
                route: easy_shop_checkout_select_payment
            shipping_skipped:
                route: easy_shop_checkout_select_payment
            payment_selected:
                route: easy_shop_checkout_complete
            payment_skipped:
                route: easy_shop_checkout_complete

liip_imagine:
    filter_sets:
        easy_shop_product_original: ~
        easy_shop_product_tiny_thumbnail:
            filters:
                thumbnail: { size: [64, 64], mode: outbound }
        easy_shop_product_small_thumbnail:
            filters:
                thumbnail: { size: [150, 112], mode: outbound }
        easy_shop_product_thumbnail:
            filters:
                thumbnail: { size: [260, 260], mode: outbound }
        easy_shop_product_large_thumbnail:
            filters:
                thumbnail: { size: [550, 412], mode: outbound }

sonata_block:
    default_contexts: ~

