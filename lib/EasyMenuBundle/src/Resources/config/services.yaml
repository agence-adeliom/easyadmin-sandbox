services:
    _defaults:
        autowire: true
        autoconfigure: true

    Adeliom\EasyMenuBundle\Controller\:
        resource: '../../Controller'
        autowire: true
        autoconfigure: true
        tags: [ 'controller.service_arguments' ]
#
#    Adeliom\EasyFaqBundle\Controller\BaseEntryController:
