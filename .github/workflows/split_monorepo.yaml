name: Split Monorepo

on:
  workflow_dispatch:
  push:
    branches:
      - '*.x'
    tags:
      - '*'

env:
  PHP_VER: '8.1'
  SPLIT_BRANCH: '2.x'
  ORG_NAME: 'agence-adeliom'

jobs:
  split_monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [easy-admin-user-bundle, easy-blog-bundle, easy-config-bundle, easy-faq-bundle, easy-menu-bundle, easy-redirect-bundle, easy-block-bundle, easy-common-bundle, easy-editor-bundle, easy-fields-bundle, easy-media-bundle, easy-page-bundle, easy-seo-bundle]

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: cd .terraform && terraform init

      - name: Terraform Plan
        run: cd .terraform && terraform plan -no-color -var='token=${{ secrets.ACCESS_TOKEN }}' -var='repo=${{ matrix.package }}' -var='branch=2.x'

      - name: Terraform Apply
        run: cd .terraform && terraform apply -auto-approve -var='token=${{ secrets.ACCESS_TOKEN }}' -var='repo=${{ matrix.package }}' -var='branch=2.x'

      - name: Monorepo Split of ${{ matrix.package }}
        uses: erkenes/monorepo-split-action@1.3.0
        with:
          access_token: "x-access-token:${{ secrets.ACCESS_TOKEN }}"
          repository_protocol: 'https://'
          repository_host: 'github.com'
          repository_organization: ${{ env.ORG_NAME }}
          repository_name: 'easyadmin-sandbox'
          default_branch: ${{ env.SPLIT_BRANCH }}
          target_branch: ${{ github.ref }}
          package_directory: 'lib/${{ matrix.package }}'
          remote_repository: 'https://github.com/${{ env.ORG_NAME }}/${{ matrix.package }}'
          remote_repository_access_token: "x-access-token:${{ secrets.ACCESS_TOKEN }}"
