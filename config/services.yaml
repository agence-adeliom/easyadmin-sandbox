# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    locale: 'fr'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones


    App\Controller\Page\PageController:
        calls:
            - [ 'setRepository', [ '@easy_page.repository' ] ]

    App\Controller\Admin\Shop\ShippingMethodCrudController:
        arguments:
            - "@sylius.registry.shipping_calculator"
            - "@sylius.form_registry.shipping_calculator"

    App\Controller\Admin\Shop\ProductAttributeCrudController:
        arguments:
            - "@EasyCorp\\Bundle\\EasyAdminBundle\\Router\\AdminUrlGenerator"
            - "@parameter_bag"
            - "@sylius.form_registry.attribute_type"
            - "@sylius.factory.product_attribute"

    App\Controller\Admin\Shop\PromotionCrudController:
        arguments:
            - "@EasyCorp\\Bundle\\EasyAdminBundle\\Router\\AdminUrlGenerator"
            - "@parameter_bag"
            - "@sylius.factory.promotion_coupon"
            - "@sylius.manager.promotion_coupon"
            - "@sylius.repository.promotion_coupon"

    App\Controller\Admin\Shop\ProductCrudController:
        arguments:
            - "@EasyCorp\\Bundle\\EasyAdminBundle\\Router\\AdminUrlGenerator"
            - "@EasyCorp\\Bundle\\EasyAdminBundle\\Provider\\AdminContextProvider"
            - "@sylius.factory.product"
            - "@sylius.factory.product_variant"
            - "@sylius.repository.product_variant"
            - "@sylius.manager.product"
            - "@sylius.manager.product_variant"

    App\Controller\Admin\Shop\CustomerCrudController:
        arguments:
            - "@sylius.factory.customer"
            - "@sylius.factory.shop_user"
            - "@parameter_bag"
