# Read the documentation at https://github.com/thephpleague/flysystem-bundle/blob/master/docs/1-getting-started.md
services:
    app.aws_s3.client:
        class: Aws\S3\S3Client
        factory: [ Aws\S3\S3Client, 'factory' ]
        arguments:
            - version: '2006-03-01'
              region: '%env(resolve:S3_REGION)%'
              use_path_style_endpoint: true
              endpoint: '%env(resolve:S3_ENDPOINT)%'
              credentials:
                  key: '%env(resolve:S3_ACCESS_KEY)%'
                  secret: '%env(resolve:S3_SECRET_KEY)%'

flysystem:
    storages:
        uploads.storage.aws:
            adapter: 'aws'
            visibility: '%env(resolve:S3_VISIBILITY)%'
            options:
                client: 'app.aws_s3.client'
                bucket: '%env(resolve:S3_BUCKET_NAME)%'
                prefix: '%env(resolve:S3_PREFIX)%'
                streamReads: true

        uploads.storage.local:
            adapter: 'local'
            options:
                directory: '%kernel.project_dir%/var/storage/uploads'

        uploads.storage:
            adapter: 'lazy'
            options:
                source: '%env(APP_UPLOADS_SOURCE)%'
